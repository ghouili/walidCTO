# Reverse proxy for the Next.js site (served by PM2 on 127.0.0.1:3000).
#
# Install on the server:
#   sudo cp deploy/nginx/walid.innoviaburst.com.conf \
#     /etc/nginx/sites-available/walid.innoviaburst.com
#   sudo ln -sf /etc/nginx/sites-available/walid.innoviaburst.com \
#     /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then add HTTPS (certbot rewrites this file to add the :443 block):
#   sudo certbot --nginx -d walid.innoviaburst.com

server {
    listen 80;
    listen [::]:80;
    server_name walid.innoviaburst.com;

    # Proxy all traffic to the Next.js app on localhost.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / streaming upgrade support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
        proxy_cache_bypass $http_upgrade;
    }
}
